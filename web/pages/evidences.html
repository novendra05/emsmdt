<div class="flex justify-between items-center mb-8 relative">
    <div>
        <h2 class="text-4xl font-extrabold text-blue-950 tracking-tight leading-none italic uppercase">Evidence Archive</h2>
        <p class="text-xs text-blue-500 font-black uppercase tracking-[0.2em] mt-2 opacity-70 italic shadow-blue-50">Official Clinical Image Repository</p>
    </div>
    <button class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-black uppercase tracking-widest transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2 group" onclick="window.PageControllers.evidences.openUploader()">
        <i class="fas fa-upload text-blue-300"></i> Store Evidence
    </button>
</div>

<div class="bg-white p-6 rounded-[2rem] border border-blue-50 shadow-blue-100/30 clinical-shadow mb-8 flex space-x-4">
    <div class="flex-1 relative">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-blue-300"></i>
        <input type="text" id="search-evidence-input" placeholder="Query ID or Title..." class="w-full bg-slate-50 border border-blue-50 rounded-2xl pl-12 pr-4 py-4 text-blue-950 font-bold placeholder:text-slate-400 focus:outline-none focus:bg-white focus:border-blue-300 transition-all">
    </div>
</div>

<div id="evidences-grid" class="grid grid-cols-4 gap-6 overflow-y-auto max-h-[calc(100vh-320px)] pb-10 pr-2">
    <!-- Items go here -->
    <div class="col-span-4 flex flex-col items-center justify-center py-20 text-blue-200 animate-pulse mt-10">
        <i class="fas fa-boxes-packing text-8xl opacity-30"></i>
        <p class="font-black tracking-[0.3em] uppercase text-[11px] text-blue-300/50 italic mt-4">Connecting to Secure Storage...</p>
    </div>
</div>
