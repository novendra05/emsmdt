<div class="employees-container h-full flex flex-col p-8">
    <!-- Horizontal Header Row -->
    <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] border border-blue-50 clinical-shadow">
        <div>
            <h1 class="text-3xl font-black text-blue-950 tracking-tight flex items-center gap-3">
                <i class="fas fa-id-card text-blue-500"></i> Personnel Registry
            </h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1 italic">Authorized Hospital Staff Management</p>
        </div>
        <button id="hire-staff-btn" onclick="window.PageControllers.employees.openHireModal()" 
                class="hidden bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all shadow-lg shadow-blue-100 flex items-center gap-2">
            <i class="fas fa-user-plus"></i> Recruit Personnel
        </button>
    </div>

    <!-- Quick Stats & Filter Bar -->
    <div class="grid grid-cols-4 gap-6 mb-6">
        <div class="bg-blue-50 border border-blue-100 rounded-2xl p-5 flex items-center gap-4">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-blue-500 shadow-sm"><i class="fas fa-users"></i></div>
            <div>
                <label class="text-[9px] text-blue-400 font-black uppercase tracking-wider block">Total Registry</label>
                <div class="text-xl font-black text-blue-950" id="total-staff-count">0</div>
            </div>
        </div>
        <div class="bg-green-50 border border-green-100 rounded-2xl p-5 flex items-center gap-4">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-green-500 shadow-sm"><i class="fas fa-heart-pulse"></i></div>
            <div>
                <label class="text-[9px] text-green-500 font-black uppercase tracking-wider block">Active Units</label>
                <div class="text-xl font-black text-green-950" id="on-duty-count">0</div>
            </div>
        </div>
        <div class="col-span-2 relative">
             <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-blue-300"></i>
             <input type="text" id="search-roster-input" 
                    class="w-full h-full bg-white border border-blue-50 rounded-[1.5rem] pl-14 pr-6 text-xs font-bold text-blue-950 focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all clinical-shadow"
                    placeholder="Search personnel by name or biometric ID...">
        </div>
    </div>

    <!-- Personnel List -->
    <div class="flex-1 overflow-hidden flex flex-col">
        <div class="grid grid-cols-12 gap-4 px-10 py-4 text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] border-b border-blue-50">
            <div class="col-span-1">Status</div>
            <div class="col-span-3">Full Identity / Biometric ID</div>
            <div class="col-span-2">Bio-Contact</div>
            <div class="col-span-2 text-center">Assigned Clinical Rank</div>
            <div class="col-span-2 text-center">Network State</div>
            <div class="col-span-2 text-right">Operations</div>
        </div>
        
        <div id="roster-list" class="flex-1 overflow-y-auto custom-scrollbar space-y-3 py-4 pr-2">
            <!-- Roster items will be loaded here as horizontal rows -->
            <div class="py-40 flex flex-col items-center text-blue-400/30">
                <i class="fas fa-dna fa-spin text-6xl mb-6"></i>
                <p class="font-black tracking-[0.3em] text-[10px] uppercase italic">Initializing Personnel Scan...</p>
            </div>
        </div>
    </div>
</div>

<style>
.custom-scrollbar::-webkit-scrollbar {
    width: 6px;
}
.custom-scrollbar::-webkit-scrollbar-track {
    background: transparent;
}
.custom-scrollbar::-webkit-scrollbar-thumb {
    background: #e2e8f0;
    border-radius: 10px;
}
.custom-scrollbar::-webkit-scrollbar-thumb:hover {
    background: #cbd5e1;
}

@keyframes slideInRow {
    from { opacity: 0; transform: translateX(-15px); }
    to { opacity: 1; transform: translateX(0); }
}

.employee-row {
    animation: slideInRow 0.3s ease forwards;
}
</style>
