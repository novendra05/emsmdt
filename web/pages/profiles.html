<div class="flex justify-between items-center mb-8">
    <div>
        <h2 class="text-4xl font-extrabold text-blue-950 tracking-tight leading-none italic uppercase">Biological Database</h2>
        <p class="text-xs text-blue-500 font-black uppercase tracking-[0.2em] mt-2 opacity-70 italic shadow-blue-50">Authorized EMS Personnel Only &bull; Secure Protocol</p>
    </div>
    <div class="h-14 w-14 bg-blue-50 border border-blue-100 rounded-2xl flex items-center justify-center text-blue-600 shadow-sm shadow-blue-100">
        <i class="fas fa-microscope text-2xl"></i>
    </div>
</div>

<div class="bg-white p-6 rounded-[2rem] border border-blue-50 shadow-blue-100/30 clinical-shadow mb-10 group focus-within:ring-4 focus-within:ring-blue-100/50 transition-all">
    <div class="flex space-x-4">
        <div class="flex-1 relative">
            <i class="fas fa-dna absolute left-4 top-1/2 -translate-y-1/2 text-blue-300"></i>
            <input type="text" id="search-patient-input" placeholder="Query Citizen Name or ID..." class="w-full bg-slate-50 border border-blue-50 rounded-2xl pl-12 pr-4 py-4 text-blue-950 font-bold placeholder:text-slate-300 placeholder:italic focus:outline-none focus:bg-white focus:border-blue-300 transition-all">
        </div>
        <button id="search-patient-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl font-black uppercase tracking-widest transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2 group">
            <i class="fas fa-bolt group-hover:scale-125 transition-all text-blue-300/50"></i> Scan Network
        </button>
    </div>
</div>

<div id="patient-results" class="flex-1 overflow-hidden min-h-0">
    <div class="h-full w-full flex flex-col items-center justify-center text-blue-200 space-y-4 py-20 animate-pulse">
        <i class="fas fa-heartbeat text-9xl opacity-20"></i>
        <p class="font-black tracking-[0.3em] uppercase text-[11px] text-blue-300/40 opacity-80 italic">Standby for Query Initialization</p>
    </div>
</div>
